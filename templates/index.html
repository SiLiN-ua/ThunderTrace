<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThunderTrace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="dark-theme">

<!-- Матрица фон -->
<canvas id="matrix-canvas"></canvas>

<!-- Приветственное окно -->
<div id="welcome-screen">
    <div class="welcome-content">
        <div class="thunder-logo">
            <i class="fas fa-bolt bolt"></i>
            <h1 class="thunder-title">ThunderTrace</h1>
            <i class="fas fa-bolt bolt"></i>
        </div>
        <p class="welcome-subtitle">// OSINT USERNAME INTELLIGENCE SYSTEM //</p>
        <p class="welcome-desc">Advanced username tracking across 350+ platforms</p>
        <button id="begin-btn" class="begin-btn">
            <i class="fas fa-bolt btn-bolt"></i> BEGIN SEARCH <i class="fas fa-bolt btn-bolt"></i>
        </button>
    </div>
</div>

<!-- Главный интерфейс -->
<div id="main-app" class="hidden">

    <!-- Шапка -->
    <header class="app-header">
        <div class="logo-small">
            <i class="fas fa-bolt btn-bolt"></i> ThunderTrace <i class="fas fa-bolt btn-bolt"></i>
        </div>
        <div class="header-controls">
            <button class="lang-btn" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('uk')">UA</button>
            <button class="lang-btn" onclick="setLang('ru')">RU</button>
            <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        </div>
    </header>

    <!-- Поиск -->
    <section class="search-section">
        <div class="search-box">
            <h2 class="section-title" data-i18n="search_title">⚡ USERNAME SEARCH</h2>
            <div id="usernames-container">
                <div class="username-row">
                    <input type="text" class="search-input username-field" 
                           placeholder="Enter username...">
                    <button class="remove-row-btn" onclick="removeRow(this)">−</button>
                </div>
            </div>
            <button class="add-row-btn" onclick="addRow()">
                <i class="fas fa-plus"></i> Add username
            </button>
            <div class="search-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="variations-check"> 
                    <span data-i18n="variations">Search variations</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="similar-check"> 
                    <span data-i18n="similar">Similar nicknames</span>
                </label>
            </div>
            <div class="category-filters">
                <span class="filter-label" data-i18n="filter_by">Filter:</span>
                <button class="filter-btn active" data-cat="all">All</button>
                <button class="filter-btn" data-cat="social">Social</button>
                <button class="filter-btn" data-cat="gaming">Gaming</button>
                <button class="filter-btn" data-cat="dev">Dev</button>
                <button class="filter-btn" data-cat="cis">CIS</button>
                <button class="filter-btn" data-cat="ukraine">🇺🇦 UA</button>
                <button class="filter-btn" data-cat="music">Music</button>
                <button class="filter-btn" data-cat="marketplace">Shop</button>
            </div>
            <button id="search-btn" class="search-btn" onclick="startSearch()">
                <i class="fas fa-bolt btn-bolt"></i> <span data-i18n="search_btn">SEARCH</span> <i class="fas fa-bolt btn-bolt"></i>
            </button>
        </div>
    </section>

    <!-- Прогресс -->
    <div id="progress-section" class="hidden">
        <canvas id="search-matrix" class="search-matrix-canvas"></canvas>
        <div class="progress-container">
            <div class="progress-info">
                <span id="progress-text">Searching... 0%</span>
                <span id="progress-timer">00:00</span>
            </div>
            <div class="progress-bar-wrap">
                <div id="progress-bar" class="progress-bar"></div>
                <div class="progress-lightning">⚡</div>
            </div>
            <p id="progress-current" class="progress-current"></p>
        </div>
    </div>

    <!-- Статистика -->
    <div id="stats-section" class="hidden stats-section">
        <div class="stat-card">
            <span class="stat-icon">✅</span>
            <span class="stat-num" id="stat-found">0</span>
            <span class="stat-label" data-i18n="found">Found</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">❌</span>
            <span class="stat-num" id="stat-notfound">0</span>
            <span class="stat-label" data-i18n="not_found">Not Found</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">⏱️</span>
            <span class="stat-num" id="stat-time">0s</span>
            <span class="stat-label" data-i18n="time">Time</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🌐</span>
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label" data-i18n="total">Total</span>
        </div>
    </div>

    <!-- Экспорт -->
    <div id="export-section" class="hidden export-section">
        <button class="export-btn" onclick="exportResults('json')">📄 JSON</button>
        <button class="export-btn" onclick="exportResults('csv')">📊 CSV</button>
        <button class="export-btn" onclick="exportResults('html')">🌐 HTML</button>
        <button class="export-btn" onclick="exportResults('pdf')">📑 PDF</button>
    </div>

    <!-- Результаты -->
    <section id="results-section" class="hidden">
        <h2 class="section-title" data-i18n="results">⚡ RESULTS</h2>
        <div id="results-grid" class="results-grid"></div>
    </section>

    <!-- Карта -->
    <section id="map-section" class="hidden">
        <h2 class="section-title">🗺️ WORLD MAP</h2>
        <div id="world-map" style="height: 400px; border-radius: 12px;"></div>
    </section>

    <!-- История -->
    <section id="history-section">
    <div class="history-header">
        <h2 class="section-title" data-i18n="history">🕐 HISTORY</h2>
        <button class="export-btn" onclick="clearAllHistory()">🗑️ Clear All</button>
    </div>
    <div id="history-list" class="history-list"></div>
</section>

    <!-- Свои сайты -->
    <section id="custom-sites-section">
        <h2 class="section-title" data-i18n="custom_sites">➕ CUSTOM SITES</h2>
        <div class="custom-site-form">
            <input type="text" id="cs-name" placeholder="Site name (e.g. MySite)" class="cs-input">
            <input type="text" id="cs-url" placeholder="https://site.com/{username}" class="cs-input">
            <input type="text" id="cs-check" placeholder="Check string (leave empty = auto)" class="cs-input">
            <select id="cs-cat" class="cs-input">
                <option value="social">Social</option>
                <option value="gaming">Gaming</option>
                <option value="dev">Dev</option>
                <option value="cis">CIS</option>
                <option value="ukraine">Ukraine</option>
                <option value="music">Music</option>
                <option value="design">Design</option>
                <option value="marketplace">Marketplace</option>
                <option value="other">Other</option>
            </select>
            <button class="export-btn" onclick="addCustomSite()"><i class="fas fa-plus"></i> Add Site</button>
        </div>
        <div id="custom-sites-list" style="margin-top:16px;"></div>
    </section>

</div>

<script src="/static/js/main.js"></script>
</body>
</html>
